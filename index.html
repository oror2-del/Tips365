<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaa365 | Premium Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: all 0.3s ease; }
        .glass:hover { background: rgba(30, 41, 59, 0.8); transform: translateY(-2px); border-color: rgba(255,255,255,0.1); }
        .active-card { border-right-width: 4px !important; background: rgba(30, 41, 59, 0.9) !important; }
        .nba-border { border-right-color: #f59e0b; }
        .math-border { border-right-color: #10b981; }
        .league-border { border-right-color: #3b82f6; }
        .hidden-content { display: none; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20 p-4">
    <div class="max-w-md mx-auto">
        <header class="pt-10 pb-8 text-center">
            <h1 class="text-3xl font-bold tracking-tighter text-white">AAA<span class="text-amber-500">365</span> ELITE</h1>
            <p class="text-gray-500 text-sm mt-1 font-medium">ניהול קופה חכם: 1,000₪</p>
        </header>

        <div class="space-y-4">
            <div id="nba-card" onclick="showTip('nba')" class="glass rounded-2xl p-6 nba-border">
                <div class="flex justify-between items-center">
                    <span class="text-amber-500 font-bold tracking-widest text-xs uppercase">🏀 NBA Daily Pick</span>
                    <span id="nba-status" class="text-[10px] text-gray-500 italic">לחץ לצפייה</span>
                </div>
                <div id="nba-content" class="hidden-content mt-5 border-t border-white/10 pt-4">
                    <h3 id="nba-match" class="text-xl font-bold text-white mb-1">טוען...</h3>
                    <p id="nba-pick" class="text-amber-400 font-semibold mb-4"></p>
                    <div class="grid grid-cols-2 gap-2 text-center">
                        <div class="bg-white/5 p-2 rounded-lg"><span class="block text-[10px] text-gray-500">יחס</span><span id="nba-odds" class="font-bold"></span></div>
                        <div class="bg-white/5 p-2 rounded-lg"><span class="block text-[10px] text-gray-500">השקעה</span><span id="nba-stake" class="font-bold text-emerald-400"></span></div>
                    </div>
                </div>
            </div>

            <div id="math-card" onclick="showTip('math')" class="glass rounded-2xl p-6 math-border">
                <div class="flex justify-between items-center">
                    <span class="text-emerald-500 font-bold tracking-widest text-xs uppercase">💎 Math Excellence 9.8/10</span>
                    <span id="math-status" class="text-[10px] text-gray-500 italic">לחץ לצפייה</span>
                </div>
                <div id="math-content" class="hidden-content mt-5 border-t border-white/10 pt-4">
                    <h3 id="math-match" class="text-xl font-bold text-white mb-1">טוען...</h3>
                    <p id="math-pick" class="text-emerald-400 font-semibold mb-4"></p>
                    <div class="grid grid-cols-2 gap-2 text-center">
                        <div class="bg-white/5 p-2 rounded-lg"><span class="block text-[10px] text-gray-500">יחס</span><span id="math-odds" class="font-bold"></span></div>
                        <div class="bg-white/5 p-2 rounded-lg"><span class="block text-[10px] text-gray-500">השקעה</span><span id="math-stake" class="font-bold text-emerald-400"></span></div>
                    </div>
                </div>
            </div>

            <div id="league-card" onclick="showTip('league')" class="glass rounded-2xl p-6 league-border">
                <div class="flex justify-between items-center">
                    <span class="text-blue-500 font-bold tracking-widest text-xs uppercase">⚽ Global Elite League</span>
                    <span id="league-status" class="text-[10px] text-gray-500 italic">לחץ לצפייה</span>
                </div>
                <div id="league-content" class="hidden-content mt-5 border-t border-white/10 pt-4">
                    <h3 id="league-match" class="text-xl font-bold text-white mb-1">טוען...</h3>
                    <p id="league-pick" class="text-blue-400 font-semibold mb-4"></p>
                    <div class="grid grid-cols-2 gap-2 text-center">
                        <div class="bg-white/5 p-2 rounded-lg"><span class="block text-[10px] text-gray-500">יחס</span><span id="league-odds" class="font-bold"></span></div>
                        <div class="bg-white/5 p-2 rounded-lg"><span class="block text-[10px] text-gray-500">השקעה</span><span id="league-stake" class="font-bold text-emerald-400"></span></div>
                    </div>
                </div>
            </div>
        </div>

        <button class="w-full mt-12 py-4 glass rounded-2xl border border-white/5 text-gray-500 text-sm font-bold tracking-widest uppercase hover:text-white transition-colors">
            📜 ארכיון תוצאות (בקרוב)
        </button>
    </div>

    <script>
        let currentTips = [];

        function showTip(type) {
            // סגירת כל השאר
            ['nba', 'math', 'league'].forEach(t => {
                document.getElementById(t + '-content').style.display = 'none';
                document.getElementById(t + '-status').innerText = 'לחץ לצפייה';
            });
            // פתיחת הנבחר
            document.getElementById(type + '-content').style.display = 'block';
            document.getElementById(type + '-status').innerText = 'פעיל';
        }

        async function loadData() {
            try {
                const res = await fetch('/api/get-tips');
                const data = await res.json();
                const tips = data.tips;

                // עדכון תוכן NBA
                document.getElementById('nba-match').innerText = tips[0].match;
                document.getElementById('nba-pick').innerText = tips[0].pick;
                document.getElementById('nba-odds').innerText = tips[0].odds;
                document.getElementById('nba-stake').innerText = tips[0].stake;

                // עדכון תוכן Math
                document.getElementById('math-match').innerText = tips[1].match;
                document.getElementById('math-pick').innerText = tips[1].pick;
                document.getElementById('math-odds').innerText = tips[1].odds;
                document.getElementById('math-stake').innerText = tips[1].stake;

                // עדכון תוכן League
                document.getElementById('league-match').innerText = tips[2].match;
                document.getElementById('league-pick').innerText = tips[2].pick;
                document.getElementById('league-odds').innerText = tips[2].odds;
                document.getElementById('league-stake').innerText = tips[2].stake;
            } catch (e) { console.log("Error loading tips"); }
        }
        loadData();
    </script>
</body>
</html>
