<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaa365 Elite Tips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0f172a; color: white; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nba-gold { border-left: 4px solid #fbbf24; }
        .top-choice { border-left: 4px solid #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Aaa365 Elite</h1>
            <p class="text-slate-400 mt-2">אלגוריתם חכם לסריקת ערך (Value) בווינר ובעולם</p>
        </header>

        <section class="mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="text-yellow-400">🏀</span> NBA Daily (הבחירה החזקה ביותר)
            </h2>
            <div id="nba-container" class="grid gap-4">
                </div>
        </section>

        <section class="mb-12">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="text-blue-400">⚽</span> Top Choice (משחקים נבחרים)
            </h2>
            <div id="top-container" class="grid md:grid-cols-2 gap-4">
                </div>
        </section>

        <section class="mt-16 pt-8 border-t border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-slate-400 flex items-center gap-2">
                <span class="text-slate-500">📜</span> ארכיון טיפים יומי
            </h2>
            <div id="archive-container" class="grid gap-3 opacity-60">
                </div>
        </section>
    </div>

    <script>
        async function loadTips() {
            try {
                const response = await fetch('/api/get-tips');
                const data = await response.json();
                
                const nbaCont = document.getElementById('nba-container');
                const topCont = document.getElementById('top-container');
                const archCont = document.getElementById('archive-container');

                // ניקוי המכולות
                nbaCont.innerHTML = '';
                topCont.innerHTML = '';

                data.tips.forEach(tip => {
                    const card = `
                        <div class="card p-5 rounded-xl ${tip.category === 'NBA Daily' ? 'nba-gold' : 'top-choice'}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-sm font-bold uppercase tracking-wider text-slate-400">${tip.category}</span>
                                <span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded text-xs font-bold">EV: ${tip.ev}</span>
                            </div>
                            <h3 class="text-xl font-bold mb-1">${tip.match}</h3>
                            <p class="text-blue-300 font-bold text-lg">${tip.pick} @ ${tip.odds}</p>
                            <div class="mt-4 flex justify-between items-center border-t border-white/5 pt-3">
                                <span class="text-slate-400 text-sm italic">השקעה מומלצת (קלי):</span>
                                <span class="text-white font-bold">${tip.stake}</span>
                            </div>
                        </div>
                    `;

                    if (tip.category === 'NBA Daily') {
                        nbaCont.innerHTML += card;
                    } else {
                        topCont.innerHTML += card;
                    }
                });

                // מילוי ארכיון (לדוגמה - יתמלא אוטומטית ככל שיעברו ימים)
                archCont.innerHTML = '<p class="text-sm text-slate-500 italic">הארכיון מתעדכן בסיום כל יום משחקים...</p>';

            } catch (e) {
                console.error("טעינת נתונים נכשלה");
            }
        }
        loadTips();
        setInterval(loadTips, 60000); // רענון כל דקה
    </script>
</body>
</html>
