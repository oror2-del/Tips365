<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips 365 - אלגוריתם חכם</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 30px;
        }
        h1 {
            color: #d4af37;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .status-bar {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            color: #4caf50;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .strategy-section {
            background: #1e1e1e;
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .strategy-title {
            color: #d4af37;
            font-size: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        .match-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .confidence-score {
            background: #d4af37;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .total-summary {
            background: #d4af37;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TIPS 365</h1>
        <p>אלגוריתם זיהוי ערך - Aaa365</p>
    </header>

    <div class="status-bar" id="status">
        📡 סורק משחקים בזמן אמת... הכל תקין
    </div>

    <div id="tips-container">
        <div class="strategy-section">
            <div class="strategy-title">
                <span>טופס 1: "העוגן" (הבטוח)</span>
                <span class="confidence-score">מדד 9.1</span>
            </div>
            <div class="match-card">
                <span>דאלאס מאבריקס - ל.א קליפרס</span>
                <span>סימון: 1</span>
            </div>
            <div class="match-card">
                <span>מיאמי היט - שיקגו בולס</span>
                <span>סימון: 1</span>
            </div>
            <div class="total-summary">
                סכום: 400 ש"ח | זכייה משוערת: 1,040 ש"ח
            </div>
            <a href="#" class="btn-whatsapp">שלח לאחי בוואטסאפ</a>
        </div>
    </div>
</div>

<script>
    // כאן נחבר את ה-API של השרת ב-Render כדי לעדכן את הדף בשידור חי
    console.log("Aaa365 Engine Initialized");
</script>

</body>
</html>
