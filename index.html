<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 | פרימיום אנליטיקה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #020305; color: #fff; min-h: 100vh; overflow-x: hidden; }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1e293b 0%, #020305 60%);
            z-index: -1; opacity: 0.8;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .category-card:hover { background: rgba(255, 255, 255, 0.06); transform: scale(1.01); }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        .tip-box { background: rgba(0, 0, 0, 0.3); border-right: 2px solid; border-radius: 12px; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-2xl mx-auto">
        <header class="mb-16 text-right">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-2">AAA<span class="text-amber-500">365</span></h1>
            <div class="flex items-center gap-3">
                <div class="status-dot animate-pulse"></div>
                <p class="text-gray-500 text-sm font-light tracking-widest uppercase">מערכת סריקה פעילה | קופה: 1,000₪</p>
            </div>
        </header>

        <div class="space-y-6">
            <div onclick="toggle('nba')" class="glass-panel category-card rounded-3xl p-8 cursor-pointer">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">🏀</span>
                        <h2 class="text-xl font-bold tracking-tight">טפסי NBA להיום</h2>
                    </div>
                    <span id="nba-count" class="bg-amber-500/10 text-amber-500 text-xs px-3 py-1 rounded-full font-bold">0 טפסים</span>
                </div>
                <div id="nba-list" class="hidden mt-8 space-y-4"></div>
            </div>

            <div onclick="toggle('math')" class="glass-panel category-card rounded-3xl p-8 cursor-pointer">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">💎</span>
                        <h2 class="text-xl font-bold tracking-tight">מצוינות מתמטית (9.5+)</h2>
                    </div>
                    <span id="math-count" class="bg-emerald-500/10 text-emerald-500 text-xs px-3 py-1 rounded-full font-bold">0 טפסים</span>
                </div>
                <div id="math-list" class="hidden mt-8 space-y-4"></div>
            </div>

            <div onclick="toggle('league')" class="glass-panel category-card rounded-3xl p-8 cursor-pointer">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">⚽</span>
                        <h2 class="text-xl font-bold tracking-tight">ליגות בכירות בעולם</h2>
                    </div>
                    <span id="league-count" class="bg-blue-500/10 text-blue-500 text-xs px-3 py-1 rounded-full font-bold">0 טפסים</span>
                </div>
                <div id="league-list" class="hidden mt-8 space-y-4"></div>
            </div>
        </div>

        <footer class="mt-20 text-center opacity-30 text-xs font-light tracking-widest uppercase">
            &copy; AAA365 ELITE ALGORITHM V2.5
        </footer>
    </div>

    <script>
        function toggle(id) {
            const el = document.getElementById(id + '-list');
            el.classList.toggle('hidden');
        }

        async function load() {
            const res = await fetch('/api/get-tips');
            const data = await res.json();
            const tips = data.tips;

            const cats = { nba: '#f59e0b', math: '#10b981', league: '#3b82f6' };

            Object.keys(cats).forEach(cat => {
                const list = document.getElementById(cat + '-list');
                const count = document.getElementById(cat + '-count');
                const filtered = tips.filter(t => t.cat === cat);
                
                count.innerText = filtered.length + " טפסים מזוהים";
                list.innerHTML = filtered.map(t => `
                    <div class="tip-box p-5 border-r-[${cats[cat]}] bg-white/5 animate-in fade-in slide-in-from-top-2 duration-500" style="border-color: ${cats[cat]}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-lg font-bold text-white">${t.m}</h4>
                                <p class="text-amber-500 font-bold mt-1">${t.p} <span class="text-gray-500 font-normal">@ ${t.o}</span></p>
                            </div>
                            <span class="text-[10px] bg-white/10 px-2 py-1 rounded text-gray-400 font-mono">VAL: ${t.r}</span>
                        </div>
                        <div class="flex justify-between items-center pt-3 border-t border-white/5">
                            <span class="text-xs text-gray-500 italic">השקעה מומלצת מ-1,000₪:</span>
                            <span class="text-xl font-black text-white">${t.s}</span>
                        </div>
                    </div>
                `).join('');
            });
        }
        load();
        setInterval(load, 60000);
    </script>
</body>
</html>
