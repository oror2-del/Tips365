<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaa365 | Premium Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nba-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .math-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .league-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .archive-btn { transition: all 0.3s ease; }
        .archive-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-md mx-auto px-6">
        <header class="pt-12 pb-8 text-center">
            <h1 class="text-3xl font-bold tracking-tighter text-white">AAA<span class="text-amber-500">365</span> ELITE</h1>
            <p class="text-gray-500 text-sm mt-1">ניהול קופה: 1,000₪ | אסטרטגיית קלי</p>
        </header>

        <div class="mb-6">
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-xs font-bold uppercase tracking-widest text-amber-500">NBA Daily Pick</h2>
                <span class="text-[10px] text-gray-500">עודכן לפני 5 דק'</span>
            </div>
            <div id="nba-card" class="glass rounded-2xl p-5 border-r-4 border-amber-500">
                </div>
        </div>

        <div class="mb-6">
            <h2 class="text-xs font-bold uppercase tracking-widest text-emerald-500 mb-3">Math Excellence (Rating: 9.8/10)</h2>
            <div id="math-card" class="glass rounded-2xl p-5 border-r-4 border-emerald-500">
                </div>
        </div>

        <div class="mb-10">
            <h2 class="text-xs font-bold uppercase tracking-widest text-blue-500 mb-3">Global Elite Leagues</h2>
            <div id="league-card" class="glass rounded-2xl p-5 border-r-4 border-blue-500">
                </div>
        </div>

        <button onclick="toggleArchive()" class="archive-btn w-full py-4 glass rounded-xl flex items-center justify-center gap-3 border border-white/10">
            <span class="text-sm font-semibold">מאגר המלצות ותוצאות ארכיון</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
        </button>

        <div id="archive-section" class="hidden mt-4 space-y-3">
            </div>
    </div>

    <script>
        function toggleArchive() {
            document.getElementById('archive-section').classList.toggle('hidden');
        }

        async function loadData() {
            // כאן המנוע מושך את הנתונים המופרדים
            const response = await fetch('/api/get-tips');
            const data = await response.json();
            
            // פונקציה פנימית לייצור כרטיס יוקרתי
            const createCard = (tip) => `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-lg font-bold text-white leading-tight">${tip.match}</h3>
                        <p class="text-gray-400 text-sm">${tip.pick}</p>
                    </div>
                    <div class="text-right">
                        <span class="block text-xl font-bold text-white">${tip.odds}</span>
                        <span class="text-[10px] text-emerald-400 font-bold uppercase">Value: ${tip.ev}</span>
                    </div>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-white/5">
                    <span class="text-xs text-gray-500 italic">השקעה מתוך 1,000₪</span>
                    <span class="bg-white/5 px-3 py-1 rounded-full text-xs font-bold text-white">${tip.stake}</span>
                </div>
            `;

            // שיבוץ לפי קטגוריות
            document.getElementById('nba-card').innerHTML = createCard(data.tips[0]);
            document.getElementById('math-card').innerHTML = createCard(data.tips[1]);
            document.getElementById('league-card').innerHTML = createCard(data.tips[2]);
        }
        loadData();
    </script>
</body>
</html>
