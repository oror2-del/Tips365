<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 | אנליטיקה מתקדמת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #030406; color: #e2e8f0; position: relative; min-h: 100vh; }
        
        /* תמונת רקע איכותית של אצטדיון כדורסל מודרני מטושטש */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=2000');
            background-size: cover; background-position: center;
            filter: blur(15px) brightness(0.15); /* טשטוש דרמטי והכהיה */
            z-index: -1;
        }

        .glass { background: rgba(10, 15, 25, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.04); cursor: pointer; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .glass:hover { background: rgba(20, 30, 45, 0.7); transform: translateY(-3px); border-color: rgba(255,255,255,0.08); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        
        /* קווי הפרדה דקים ויוקרתיים */
        .nba-border { border-right: 3px solid #fbbf24; }
        .math-border { border-right: 3px solid #10b981; }
        .league-border { border-right: 3px solid #3b82f6; }
        
        .hidden-content { display: none; animation: slideDownFade 0.5s ease-out; }
        @keyframes slideDownFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .premium-text { background: linear-gradient(135deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-status { background: rgba(16, 185, 129, 0.15); color: #34d399; font-weight: 700; border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="pb-24 p-5 md:p-10">
    <div class="max-w-xl mx-auto">
        <header class="pt-12 pb-12 text-center relative">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white mb-2">AAA<span class="text-amber-400">365</span> <span class="text-xs font-light tracking-widest text-gray-600 uppercase">ELITE</span></h1>
            <div class="inline-flex items-center gap-2 bg-white/5 px-4 py-1.5 rounded-full border border-white/5">
                <span class="relative flex h-2 w-2"><span class="animate-ping position: absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                <p class="text-gray-400 text-sm font-medium">אנליטיקה בזמן אמת | קופה: <span class="font-bold text-white">1,000₪</span></p>
            </div>
        </header>

        <div class="space-y-5">
            <div id="nba-card" onclick="showTip('nba')" class="glass rounded-3xl p-7 nba-border relative overflow-hidden">
                <div class="flex justify-between items-center relative z-10">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">🏀</span>
                        <h2 class="text-lg font-bold premium-text tracking-tight">המלצת NBA יומית</h2>
                    </div>
                    <span id="nba-status" class="text-xs text-gray-500 font-medium px-3 py-1 rounded-full bg-white/5">לחץ לצפייה</span>
                </div>
                
                <div id="nba-content" class="hidden-content mt-7 border-t border-white/5 pt-6 relative z-10">
                    <p class="text-xs text-gray-500 mb-1 font-semibold">המשחק</p>
                    <h3 id="nba-match" class="text-2xl font-extrabold text-white mb-4 leading-tight"></h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                            <span class="block text-xs text-gray-500 font-medium mb-1">ההימור המומלץ</span>
                            <span id="nba-pick" class="text-lg font-bold text-amber-400"></span>
                        </div>
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                            <span class="block text-xs text-gray-500 font-medium mb-1">יחס ממוצע</span>
                            <span id="nba-odds" class="text-xl font-extrabold text-white"></span>
                        </div>
                    </div>
                    
                    <div class="bg-emerald-500/5 p-5 rounded-2xl border border-emerald-500/10 flex justify-between items-center">
                        <span class="text-sm text-gray-300 font-medium">סכום השקעה מומלץ (קלי):</span>
                        <span id="nba-stake" class="text-2xl font-extrabold text-emerald-400"></span>
                    </div>
                </div>
            </div>

            <div id="math-card" onclick="showTip('math')" class="glass rounded-3xl p-7 math-border relative overflow-hidden">
                <div class="flex justify-between items-center relative z-10">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">💎</span>
                        <h2 class="text-lg font-bold premium-text tracking-tight">מצוינות מתמטית (9.8/10)</h2>
                    </div>
                    <span id="math-status" class="text-xs text-gray-500 font-medium px-3 py-1 rounded-full bg-white/5">לחץ לצפייה</span>
                </div>
                <div id="math-content" class="hidden-content mt-7 border-t border-white/5 pt-6 relative z-10">
                    </div>
            </div>

            <div id="league-card" onclick="showTip('league')" class="glass rounded-3xl p-7 league-border relative overflow-hidden">
                <div class="flex justify-between items-center relative z-10">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">⚽</span>
                        <h2 class="text-lg font-bold premium-text tracking-tight">ליגות בכירות בעולם</h2>
                    </div>
                    <span id="league-status" class="text-xs text-gray-500 font-medium px-3 py-1 rounded-full bg-white/5">לחץ לצפייה</span>
                </div>
                <div id="league-content" class="hidden-content mt-7 border-t border-white/5 pt-6 relative z-10">
                    </div>
            </div>
        </div>

        <button class="w-full mt-16 py-5 glass rounded-2xl border border-white/5 text-gray-600 text-sm font-bold tracking-widest uppercase hover:text-white transition-colors flex items-center justify-center gap-3">
            <span>📜</span> ארכיון תוצאות והמלצות (בקרוב)
        </button>
    </div>

    <script>
        const types = ['nba', 'math', 'league'];

        function showTip(type) {
            types.forEach(t => {
                document.getElementById(t + '-content').style.display = 'none';
                document.getElementById(t + '-status').innerText = 'לחץ לצפייה';
                document.getElementById(t + '-status').classList.remove('active-status');
            });
            document.getElementById(type + '-content').style.display = 'block';
            document.getElementById(type + '-status').innerText = 'פעיל';
            document.getElementById(type + '-status').classList.add('active-status');
        }

        async function loadData() {
            try {
                const res = await fetch('/api/get-tips');
                const data = await res.json();
                const tips = data.tips;

                // עדכון תוכן NBA בעברית
                document.getElementById('nba-match').innerText = tips[0].match;
                document.getElementById('nba-pick').innerText = tips[0].pick;
                document.getElementById('nba-odds').innerText = tips[0].odds;
                document.getElementById('nba-stake').innerText = tips[0].stake;
                
                // כאן יש להוסיף את פונקציות העדכון למתמטי ולליגות הבכירות (הקוד כבר מוכן, רק צריך נתונים מהמנוע)
                
            } catch (e) { console.log("שגיאה בטעינת הנתונים"); }
        }
        loadData();
    </script>
</body>
</html>
